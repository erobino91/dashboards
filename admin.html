<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Clientes</title>
<link rel="stylesheet" href="css/style.css" />
<style>
  .section-toggles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .toggle-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--bg-input);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
  .toggle-item:hover { border-color: var(--border-md); }
  .toggle-item:has(input:checked) { border-color: var(--purple); background: var(--purple-bg); }
  .toggle-item input[type="checkbox"] {
    accent-color: var(--purple);
    width: 15px;
    height: 15px;
    cursor: pointer;
  }
  .toggle-label { color: var(--text-secondary); font-weight: 500; }
  .toggle-item:has(input:checked) .toggle-label { color: var(--text); }
</style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="topbar-brand">
    <img src="logo-agencia.png" style="height:40px;width:auto;object-fit:contain;background:white;border-radius:6px;padding:4px 14px;" alt="Momentum" />
    Dashboard de clientes
  </div>
  <div class="topbar-actions">
    <span class="topbar-user" id="userName"></span>
    <button class="btn-icon" onclick="SB.auth.signOut().then(function(){ window.location.href='index.html'; })" title="Sair">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── CONTENT ── -->
<div class="container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Clientes</h1>
      <p class="page-subtitle">Gerencie os dashboards dos seus restaurantes</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Novo cliente
    </button>
  </div>

  <div id="clientList" class="client-grid">
    <div class="loading-full"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── MODAL: Criar/Editar cliente ── -->
<div class="modal-overlay" id="clientModal" style="display:none">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">Novo cliente</h2>

    <div class="form-group">
      <label class="form-label">Nome do restaurante</label>
      <input type="text" class="form-input" id="clientName" placeholder="Ex: Pizzaria da Vila" />
    </div>

    <div class="form-group">
      <label class="form-label">Slug (URL pública)</label>
      <input type="text" class="form-input" id="clientSlug" placeholder="pizzaria-da-vila" style="font-family: var(--mono);" />
      <small style="color: var(--text-muted); font-size:11px; margin-top:4px; display:block;">
        Será usado na URL: seusite.com/dash.html?c=<strong id="slugPreview">...</strong>
      </small>
    </div>

    <div class="form-group">
      <label class="form-label">Logo do cliente</label>
      <div class="file-input-wrap">
        <div class="file-preview" id="logoPreview" style="display:none"><img id="logoPreviewImg" /></div>
        <div style="flex:1; position:relative;">
          <input type="file" accept="image/*" onchange="previewLogo(this, 'logoPreview', 'logoPreviewImg')" id="logoFile" />
          <div class="file-input-label">Clique para enviar imagem</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-select" id="clientActive">
        <option value="true">Ativo</option>
        <option value="false">Inativo</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Seções do dashboard</label>
      <div class="section-toggles" id="sectionToggles">
        <label class="toggle-item"><input type="checkbox" value="faturamento" checked /><span class="toggle-label">Controle Total</span></label>
        <label class="toggle-item"><input type="checkbox" value="salao" checked /><span class="toggle-label">Salão</span></label>
        <label class="toggle-item"><input type="checkbox" value="delivery" checked /><span class="toggle-label">Delivery Próprio</span></label>
        <label class="toggle-item"><input type="checkbox" value="funil_cp" checked /><span class="toggle-label">Funil Próprio</span></label>
        <label class="toggle-item"><input type="checkbox" value="ifood" checked /><span class="toggle-label">iFood</span></label>
        <label class="toggle-item"><input type="checkbox" value="meta" checked /><span class="toggle-label">Meta Ads</span></label>
        <label class="toggle-item"><input type="checkbox" value="google" checked /><span class="toggle-label">Google Ads</span></label>
        <label class="toggle-item"><input type="checkbox" value="crm" checked /><span class="toggle-label">CRM</span></label>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient()" id="btnSave">Salvar</button>
    </div>
  </div>
</div>

<!-- ── MODAL: Confirmar exclusão ── -->
<div class="modal-overlay" id="deleteModal" style="display:none">
  <div class="modal" style="max-width:400px; text-align:center;">
    <h2 class="modal-title" style="text-align:center;">Excluir cliente?</h2>
    <p style="color: var(--text-secondary); font-size:14px; margin-bottom:1.5rem;">
      Todos os dados e períodos deste cliente serão excluídos permanentemente.
    </p>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmDelete()" id="btnDelete">Excluir</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB = window.supabase.createClient(
  'https://mynolirdauvkubxvlddt.supabase.co',
  'sb_publishable_LnvMZ7skiOJ1p6CALaqDiA_0AtUfOku'
);

const ALL_SECTIONS = ['faturamento','salao','delivery','funil_cp','ifood','meta','google','crm'];

let editingId = null;
let deletingId = null;
let clients = [];

function getSelectedSections() {
  return Array.from(document.querySelectorAll('#sectionToggles input:checked')).map(cb => cb.value);
}

function setSelectedSections(arr) {
  const list = arr || ALL_SECTIONS;
  document.querySelectorAll('#sectionToggles input').forEach(cb => {
    cb.checked = list.includes(cb.value);
  });
}

async function uploadLogo(file, folder) {
  const ext = file.name.split('.').pop();
  const fileName = folder + '/' + Date.now() + '.' + ext;
  const { data, error } = await SB.storage.from('logos').upload(fileName, file);
  if (error) throw error;
  const { data: { publicUrl } } = SB.storage.from('logos').getPublicUrl(fileName);
  return publicUrl;
}

// ── INIT ──
(async () => {
  const { data: { user } } = await SB.auth.getUser();
  if (!user) { window.location.href = 'index.html'; return; }

  const { data: profile } = await SB.from('profiles').select('*').eq('id', user.id).single();
  document.getElementById('userName').textContent = profile?.full_name || user.email;

  loadClients();
})();

// ── LOAD ──
async function loadClients() {
  const { data, error } = await SB.from('clients').select('*').order('created_at', { ascending: false });
  if (error) return showToast('Erro ao carregar clientes', 'error');
  clients = data || [];
  renderClients();
}

// ── RENDER ──
function renderClients() {
  const el = document.getElementById('clientList');

  if (clients.length === 0) {
    el.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/>
        </svg>
        <h3>Nenhum cliente cadastrado</h3>
        <p>Clique em "Novo cliente" para começar</p>
      </div>`;
    return;
  }

  el.innerHTML = clients.map(c => `
    <div class="client-card" onclick="goToClient('${c.id}')">
      <div class="client-card-top">
        <div class="client-card-logo">
          ${c.logo_url ? `<img src="${c.logo_url}" />` : `<svg width="20" height="20" fill="none" stroke="#71717A" stroke-width="1.5" viewBox="0 0 24 24"><path d="M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z"/></svg>`}
        </div>
        <div>
          <div class="client-card-name">${c.name}</div>
          <div class="client-card-slug">/${c.slug}</div>
        </div>
      </div>
      <div class="client-card-bottom">
        <span class="${c.is_active ? 'badge-active' : 'badge-inactive'}">
          ${c.is_active ? '● Ativo' : '● Inativo'}
        </span>
        <div class="client-card-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="editClient('${c.id}')" title="Editar">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="btn-icon" onclick="deleteClient('${c.id}')" title="Excluir">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── NAVIGATE ──
function goToClient(id) {
  window.location.href = `periods.html?client=${id}`;
}

// ── SLUG AUTO-GENERATE ──
document.getElementById('clientName').addEventListener('input', function() {
  if (!editingId) {
    const slug = this.value
      .toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '');
    document.getElementById('clientSlug').value = slug;
    document.getElementById('slugPreview').textContent = slug || '...';
  }
});
document.getElementById('clientSlug').addEventListener('input', function() {
  document.getElementById('slugPreview').textContent = this.value || '...';
});

// ── MODAL ──
function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Novo cliente';
  document.getElementById('clientName').value = '';
  document.getElementById('clientSlug').value = '';
  document.getElementById('slugPreview').textContent = '...';
  document.getElementById('clientActive').value = 'true';
  document.getElementById('logoFile').value = '';
  document.getElementById('logoPreview').style.display = 'none';
  setSelectedSections(ALL_SECTIONS);
  document.getElementById('clientModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('clientModal').style.display = 'none';
}

function editClient(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar cliente';
  document.getElementById('clientName').value = c.name;
  document.getElementById('clientSlug').value = c.slug;
  document.getElementById('slugPreview').textContent = c.slug;
  document.getElementById('clientActive').value = String(c.is_active);

  if (c.logo_url) {
    document.getElementById('logoPreview').style.display = 'block';
    document.getElementById('logoPreviewImg').src = c.logo_url;
  } else {
    document.getElementById('logoPreview').style.display = 'none';
  }
  setSelectedSections(c.active_sections);
  document.getElementById('clientModal').style.display = 'flex';
}

// ── FILE PREVIEW ──
function previewLogo(input, previewId, imgId) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(imgId).src = e.target.result;
      document.getElementById(previewId).style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

// ── SAVE ──
async function saveClient() {
  const name = document.getElementById('clientName').value.trim();
  const slug = document.getElementById('clientSlug').value.trim();
  const isActive = document.getElementById('clientActive').value === 'true';

  if (!name || !slug) return showToast('Preencha nome e slug.', 'error');

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    let logoUrl = null;

    const logoFile = document.getElementById('logoFile').files[0];
    if (logoFile) logoUrl = await uploadLogo(logoFile, 'clients');

    const payload = { name, slug, is_active: isActive, active_sections: getSelectedSections() };
    if (logoUrl) payload.logo_url = logoUrl;

    if (editingId) {
      payload.updated_at = new Date().toISOString();
      const { error } = await SB.from('clients').update(payload).eq('id', editingId);
      if (error) throw error;
      showToast('Cliente atualizado!', 'success');
    } else {
      const { error } = await SB.from('clients').insert(payload);
      if (error) {
        if (error.message.includes('duplicate')) throw new Error('Esse slug já está em uso.');
        throw error;
      }
      showToast('Cliente criado!', 'success');
    }

    closeModal();
    loadClients();
  } catch (e) {
    showToast(e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Salvar';
}

// ── DELETE ──
function deleteClient(id) {
  deletingId = id;
  document.getElementById('deleteModal').style.display = 'flex';
}

function closeDeleteModal() {
  document.getElementById('deleteModal').style.display = 'none';
  deletingId = null;
}

async function confirmDelete() {
  if (!deletingId) return;
  const btn = document.getElementById('btnDelete');
  btn.disabled = true;
  btn.textContent = 'Excluindo...';

  const { error } = await SB.from('clients').delete().eq('id', deletingId);
  if (error) {
    showToast('Erro ao excluir: ' + error.message, 'error');
  } else {
    showToast('Cliente excluído.', 'success');
  }

  closeDeleteModal();
  loadClients();
  btn.disabled = false;
  btn.textContent = 'Excluir';
}

// ── TOAST ──
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.getElementById('toastContainer').appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

// Close modals on overlay click
document.getElementById('clientModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById('deleteModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDeleteModal();
});
</script>
</body>
</html>
